<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Productos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>body { min-height: 100vh; display: flex; flex-direction: column; }</style>
</head>
<body class="bg-light">

    <div class="container mt-5 flex-grow-1">

        <div class="card shadow-sm">

            <div class="card-header bg-success text-white d-flex align-items-center gap-2">
                <a href="/index.html" class="btn btn-sm btn-outline-light">← Inicio</a>
                <h3 class="mb-0">Gestión de Productos</h3>
            </div>

            <div class="card-body">

                <!-- FORMULARIO -->
                <form id="productoForm">

                    <input type="hidden" id="productoId">

                    <div class="row mb-3">

                        <div class="col-md-6">
                            <label class="form-label">Nombre</label>

                            <input type="text"
                                   id="nombre"
                                   class="form-control"
                                   required>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label">Categoría</label>

                            <select id="categoriaId"
                                    class="form-select"
                                    required>
                            </select>
                        </div>

                    </div>

                    <div class="row mb-3">

                        <div class="col-md-6">
                            <label class="form-label">Descripción</label>

                            <textarea id="descripcion"
                                      class="form-control"></textarea>
                        </div>

                        <div class="col-md-3">
                            <label class="form-label">Precio</label>

                            <input type="number"
                                   step="0.01"
                                   id="precio"
                                   class="form-control"
                                   required>
                        </div>

                        <div class="col-md-3">
                            <label class="form-label">Stock</label>

                            <input type="number"
                                   id="stock"
                                   class="form-control"
                                   required>
                        </div>

                    </div>

                    <div class="row mb-3">

                        <div class="col-md-3">

                            <div class="form-check mt-4">

                                <input class="form-check-input"
                                       type="checkbox"
                                       id="activo">

                                <label class="form-check-label">
                                    Activo
                                </label>

                            </div>

                        </div>

                        <div class="col-md-9 d-grid">

                            <button class="btn btn-success mt-3"
                                    type="submit">
                                Guardar Producto
                            </button>

                        </div>

                    </div>

                </form>

                <hr>

                <!-- TABLA -->
                <table class="table table-bordered table-hover">

                    <thead class="table-dark">

                        <tr>
                            <th>ID</th>
                            <th>Nombre</th>
                            <th>Precio</th>
                            <th>Stock</th>
                            <th>Categoría</th>
                            <th>Activo</th>
                            <th width="180">Acciones</th>
                        </tr>

                    </thead>

                    <tbody id="productosTable"></tbody>

                </table>

            </div>

        </div>

    </div>

    <script src="/js/productos.js"></script>

    <footer class="text-center text-muted py-3 mt-4 border-top">
        <small>Sistema de Gestión &copy; 2025</small>
    </footer>

</body>
</html>
