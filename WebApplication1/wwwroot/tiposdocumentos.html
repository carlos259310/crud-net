<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tipos de Documentos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>body { min-height: 100vh; display: flex; flex-direction: column; }</style>
</head>
<body class="bg-light">

    <div class="container mt-5 flex-grow-1">

        <div class="card shadow-sm">

            <div class="card-header bg-info text-white d-flex align-items-center gap-2">
                <a href="/index.html" class="btn btn-sm btn-outline-light">← Inicio</a>
                <h3 class="mb-0">Gestión de Tipos de Documentos</h3>
            </div>

            <div class="card-body">

                <!-- FORMULARIO -->
                <form id="tiposdocumentosForm">

                    <input type="hidden" id="tipodocumentoId">

                    <div class="row g-3 align-items-end">

                        <div class="col-md-5">
                            <label class="form-label">Código</label>
                            <input type="text"
                                   id="codigo"
                                   class="form-control"
                                   placeholder="Código del tipo documento"
                                   required>
                        </div>

                        <div class="col-md-5">
                            <label class="form-label">Nombre</label>
                            <input type="text"
                                   id="nombre"
                                   class="form-control"
                                   placeholder="Nombre del tipo documento"
                                   required>
                        </div>

                        <div class="col-md-2 d-grid">
                            <button class="btn btn-success" type="submit">
                                Guardar
                            </button>
                        </div>

                    </div>

                </form>

                <hr>

                <!-- TABLA -->
                <table class="table table-striped table-hover">

                    <thead class="table-dark">
                        <tr>
                            <th>ID</th>
                            <th>Código</th>
                            <th>Nombre</th>
                            <th width="180">Acciones</th>
                        </tr>
                    </thead>

                    <tbody id="tipodocumentoTable"></tbody>

                </table>

            </div>

        </div>

    </div>

    <script src="/js/tiposdocumentos.js"></script>

    <footer class="text-center text-muted py-3 mt-4 border-top">
        <small>Sistema de Gestión &copy; 2025</small>
    </footer>

</body>
</html>
